appId: dev.daisyreach.desktop
productName: DaisyReach
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - "!dist/renderer/**/*"
extraResources:
  - from: dist/renderer
    to: renderer
mac:
  category: public.app-category.business
  hardenedRuntime: true
  target:
    - target: dmg
      arch: [arm64]
win:
  target:
    - target: nsis
      arch: [x64]
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Office
