appId: com.gitdek.daisyreach-desktop
productName: DaisyReach
copyright: Copyright © 2026 gitdek

directories:
  output: release

files:
  - dist/**/*
  - "!dist/renderer/**/*"

extraResources:
  - from: dist/renderer
    to: renderer

mac:
  category: public.app-category.business
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - nsis
  artifactName: ${name}-setup-${version}.${ext}

linux:
  target:
    - AppImage
    - deb
  category: Office

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
